<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dokkhallen Harstad — fotorealistisk 3D solstudie</title>
<script>window.CESIUM_BASE_URL = "https://unpkg.com/cesium/Build/Cesium/";</script>
<script src="https://unpkg.com/cesium/Build/Cesium/Cesium.js"></script>
<link href="https://unpkg.com/cesium/Build/Cesium/Widgets/widgets.css" rel="stylesheet"/>
<style>
  :root{ --panel:#171c24cc; --line:#2a323d; --txt:#e7ecf2; --mut:#8b97a6; --acc:#4ea3ff; }
  html,body,#cesiumContainer{ margin:0; width:100%; height:100%; overflow:hidden;
    font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0e1116; }
  #ui{ position:fixed; top:12px; left:12px; width:290px; background:var(--panel); color:var(--txt);
    border:1px solid var(--line); border-radius:10px; padding:14px; backdrop-filter:blur(8px); z-index:10; }
  #ui h1{ font-size:13px; margin:0 0 2px; } #ui .sub{ color:var(--mut); font-size:11px; margin-bottom:10px; }
  .row{ margin:9px 0; } .row label{ display:flex; justify-content:space-between; color:var(--mut); font-size:11px; margin-bottom:3px; }
  .row label b{ color:var(--txt); font-variant-numeric:tabular-nums; }
  input[type=range]{ width:100%; accent-color:var(--acc); }
  .readout{ display:flex; gap:8px; margin-top:6px; }
  .chip{ flex:1; background:#0f141b88; border:1px solid var(--line); border-radius:7px; padding:6px; text-align:center; }
  .chip span{ display:block; color:var(--mut); font-size:10px; } .chip b{ font-size:14px; font-variant-numeric:tabular-nums; }
  .btns{ display:flex; gap:6px; margin-top:10px; }
  button{ flex:1; background:#222b36; color:var(--txt); border:1px solid var(--line); border-radius:7px; padding:8px; cursor:pointer; }
  button.on{ background:var(--acc); color:#03121f; font-weight:600; }
  .chk{ display:flex; align-items:center; gap:8px; margin:10px 0 2px; cursor:pointer; }
  .chk input{ accent-color:var(--acc); width:16px; height:16px; }
  details{ margin-top:8px; } summary{ color:var(--mut); cursor:pointer; font-size:11px; }
  #load{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; color:#8b97a6; background:#0e1116; z-index:20; }
</style>
</head>
<body>
<div id="cesiumContainer"></div>
<div id="load">Laster Harstad (Google 3D Tiles)…</div>
<div id="ui">
  <h1>Dokkhallen Harstad — fotorealistisk</h1>
  <div class="sub">Google 3D Tiles · sol og skygger i sanntid</div>
  <div class="row"><label>Dato <b id="dLbl">21. jun</b></label><input id="day" type="range" min="0" max="364" value="171"/></div>
  <div class="row"><label>Klokkeslett (CET) <b id="tLbl">13:00</b></label><input id="hour" type="range" min="0" max="1439" value="780"/></div>
  <div class="readout">
    <div class="chip"><span>SOLHØYDE</span><b id="elv">–</b></div>
    <div class="chip"><span>ASIMUT</span><b id="azm">–</b></div>
  </div>
  <label class="chk"><input id="toggle" type="checkbox" checked/> Vis foreslått dokkhall</label>
  <div class="btns"><button id="bPlay">▶ Dag</button><button id="bHome">⌂ Oversikt</button></div>
  <div class="row" style="display:flex;align-items:center;gap:10px;margin-top:10px">
    <div id="pegman" title="Dra meg ut på kartet for å stå der (øyehøyde 1,7 m)"
         style="font-size:28px;cursor:grab;user-select:none;line-height:1;touch-action:none">🧍</div>
    <span style="color:var(--mut);font-size:11px">Dra figuren ut på kartet for gateplan-visning</span>
  </div>
  <div class="sub" id="tip" style="margin-top:8px"></div>
</div>
<script>
const WORKER = "https://g3d.brattkart.online";
const LAT = 68.7970, LON = 16.5427, UTC_OFFSET = 1.0;

// --- NOAA sun (for the on-screen elevation/azimuth readout) ---
function sunAzEl(y,mo,d,h){ const r=Math.PI/180,g_=180/Math.PI,hU=h-UTC_OFFSET;
  const a=Math.floor((14-mo)/12),Y=y+4800-a,M=mo+12*a-3;
  const jdn=d+Math.floor((153*M+2)/5)+365*Y+Math.floor(Y/4)-Math.floor(Y/100)+Math.floor(Y/400)-32045;
  const jd=jdn+(hU-12)/24,n=jd-2451545,gg=((357.529+0.98560028*n)%360)*r,L=((280.459+0.98564736*n)%360)*r;
  const lam=L+(1.915*Math.sin(gg)+0.020*Math.sin(2*gg))*r,ep=(23.439-3.6e-7*n)*r,dec=Math.asin(Math.sin(ep)*Math.sin(lam));
  const yy=Math.tan(ep/2)**2,eot=4*g_*(yy*Math.sin(2*L)-2*0.0167*Math.sin(gg)+4*0.0167*yy*Math.sin(gg)*Math.cos(2*L)-0.5*yy*yy*Math.sin(4*L)-1.25*2.79e-4*Math.sin(2*gg));
  const tst=((hU*60+eot+4*LON)%1440+1440)%1440,ha=(tst/4-180)*r,la=LAT*r;
  const el=90-Math.acos(Math.sin(la)*Math.sin(dec)+Math.cos(la)*Math.cos(dec)*Math.cos(ha))*g_;
  let az=Math.atan2(Math.sin(ha),Math.cos(ha)*Math.sin(la)-Math.tan(dec)*Math.cos(la))*g_+180; az=(az%360+360)%360;
  return {az,el}; }
const MON=["jan","feb","mar","apr","mai","jun","jul","aug","sep","okt","nov","des"];
function doyMD(doy){ const dt=new Date(Date.UTC(2025,0,1+doy)); return [dt.getUTCMonth()+1, dt.getUTCDate()]; }

Cesium.Ion.defaultAccessToken = undefined;   // no ion assets used
const viewer = new Cesium.Viewer("cesiumContainer", {
  baseLayer:false, baseLayerPicker:false, geocoder:false, homeButton:false,
  sceneModePicker:false, navigationHelpButton:false, animation:false, timeline:false,
  fullscreenButton:false, infoBox:false, selectionIndicator:false, shadows:true,
  terrainProvider: new Cesium.EllipsoidTerrainProvider(),
  contextOptions:{ webgl:{ powerPreference:"high-performance" } },
});
const scene = viewer.scene;
scene.globe.show = false;                 // show only the Google mesh
scene.skyAtmosphere.show = true;
scene.shadowMap.size = 2048;
scene.shadowMap.softShadows = true;
scene.shadowMap.fadingEnabled = false;   // keep low-sun shadows (Cesium otherwise fades them near the horizon)
scene.shadowMap.maximumDistance = 10000; // allow long low-angle shadows
scene.light = new Cesium.SunLight();
viewer.clock.shouldAnimate = false;

// Google tiles are UNLIT (daylight baked into the textures), so the sun only
// moves shadows — it can't darken them. Dim the whole image when the sun is low
// so dusk / polar night read dark. (built-in stage, no custom GLSL)
const dimStage = Cesium.PostProcessStageLibrary.createBrightnessStage();
scene.postProcessStages.add(dimStage);
function dayFactor(el){            // 1.0 daylight -> ~0.12 deep night, smooth twilight
  const t = Math.min(1, Math.max(0, (el + 6) / 10));
  return 0.12 + 0.88 * t;
}

const site = Cesium.Cartesian3.fromDegrees(LON, LAT, 60);
function homeView(dur){
  // frame the hall's bounding sphere so it stays centered, with surroundings in view
  const center = Cesium.Cartesian3.fromDegrees(LON, LAT, 25);
  viewer.camera.flyToBoundingSphere(new Cesium.BoundingSphere(center, 260), {
    offset: new Cesium.HeadingPitchRange(Cesium.Math.toRadians(125), Cesium.Math.toRadians(-30), 850),
    duration: dur === undefined ? 1.2 : dur,
  });
}

let proposal = null;
async function init(){
  // Google Photorealistic 3D Tiles via the Cloudflare worker (key hidden)
  const tileset = await Cesium.Cesium3DTileset.fromUrl(`${WORKER}/v1/3dtiles/root.json`, {
    showCreditsOnScreen:true, maximumScreenSpaceError:12,
  });
  tileset.shadows = Cesium.ShadowMode.ENABLED;
  scene.primitives.add(tileset);

  // proposed Dokkhallen overlay (local ENU frame at the site)
  updateProposalMatrix();
  proposal = await Cesium.Model.fromGltfAsync({
    url:"proposal.glb", modelMatrix: proposalMatrix(),
    shadows:Cesium.ShadowMode.ENABLED,
  });
  scene.primitives.add(proposal);

  document.getElementById("load").remove();
  homeView(0);          // centered immediately on load
  updateSun();
}
function proposalMatrix(){
  const origin = Cesium.Cartesian3.fromDegrees(LON, LAT, 30);   // baked-in placement
  const hpr = new Cesium.HeadingPitchRoll(Cesium.Math.toRadians(90), 0, 0);
  return Cesium.Transforms.headingPitchRollToFixedFrame(origin, hpr);
}
let proposalMatrixCache;
function updateProposalMatrix(){ proposalMatrixCache = proposalMatrix(); if(proposal) proposal.modelMatrix = proposalMatrixCache; }

// --- UI ---
const dayEl=document.getElementById("day"), hourEl=document.getElementById("hour");
function updateSun(){
  const [mo,da]=doyMD(+dayEl.value); const hod=(+hourEl.value)/60;
  document.getElementById("dLbl").textContent=da+". "+MON[mo-1];
  document.getElementById("tLbl").textContent=String(Math.floor(hod)).padStart(2,"0")+":"+String(Math.round(hod%1*60)).padStart(2,"0");
  const {az,el}=sunAzEl(2025,mo,da,hod);
  document.getElementById("elv").textContent=el.toFixed(0)+"°";
  document.getElementById("azm").textContent=az.toFixed(0)+"°";
  // drive Cesium clock (UTC = CET - 1) -> Cesium positions the real sun + shadows
  const jsDate=new Date(Date.UTC(2025,mo-1,da,0,0,0)); jsDate.setUTCMinutes(Math.round((hod-UTC_OFFSET)*60));
  viewer.clock.currentTime = Cesium.JulianDate.fromDate(jsDate);
  dimStage.uniforms.brightness = dayFactor(el);   // dusk/night dimming
  scene.requestRender();
}
dayEl.oninput=updateSun; hourEl.oninput=updateSun;
document.getElementById("toggle").onchange=(e)=>{ if(proposal) proposal.show=e.target.checked; scene.requestRender(); };
// --- Street-View-style Pegman: drag the figure onto the map to stand at eye level ---
const EYE = 1.7;
const cc = scene.screenSpaceCameraController;
const DEF = { rot:cc.rotateEventTypes, tilt:cc.tiltEventTypes, tr:cc.translateEventTypes, look:cc.lookEventTypes, zoom:cc.zoomEventTypes };
let groundMode = false;
const tipEl = document.getElementById("tip");

function standAt(pos){
  const up = Cesium.Ellipsoid.WGS84.geodeticSurfaceNormal(pos, new Cesium.Cartesian3());
  const eye = Cesium.Cartesian3.add(pos, Cesium.Cartesian3.multiplyByScalar(up, EYE, new Cesium.Cartesian3()), new Cesium.Cartesian3());
  const hall = Cesium.Cartesian3.fromDegrees(LON, LAT, 15);
  let dir = Cesium.Cartesian3.subtract(hall, eye, new Cesium.Cartesian3());
  const d = Cesium.Cartesian3.dot(dir, up);
  Cesium.Cartesian3.subtract(dir, Cesium.Cartesian3.multiplyByScalar(up, d, new Cesium.Cartesian3()), dir);  // horizontalise
  if (Cesium.Cartesian3.magnitude(dir) < 0.5) dir = Cesium.Cartesian3.cross(up, Cesium.Cartesian3.UNIT_Z, new Cesium.Cartesian3());
  Cesium.Cartesian3.normalize(dir, dir);
  viewer.camera.setView({ destination: eye, orientation: { direction: dir, up } });
}
function moveForward(step){
  const cam = viewer.camera;
  const up = Cesium.Ellipsoid.WGS84.geodeticSurfaceNormal(cam.positionWC, new Cesium.Cartesian3());
  // current facing, flattened to horizontal
  const fwd = Cesium.Cartesian3.clone(cam.directionWC, new Cesium.Cartesian3());
  const dd = Cesium.Cartesian3.dot(fwd, up);
  Cesium.Cartesian3.subtract(fwd, Cesium.Cartesian3.multiplyByScalar(up, dd, new Cesium.Cartesian3()), fwd);
  if (Cesium.Cartesian3.magnitude(fwd) < 1e-6) return;
  Cesium.Cartesian3.normalize(fwd, fwd);
  const ahead = Cesium.Cartesian3.add(cam.positionWC, Cesium.Cartesian3.multiplyByScalar(fwd, step, new Cesium.Cartesian3()), new Cesium.Cartesian3());
  const ground = scene.clampToHeight(ahead, proposal ? [proposal] : []);   // stay on terrain, don't climb the hall
  const base = Cesium.defined(ground) ? ground : ahead;
  const up2 = Cesium.Ellipsoid.WGS84.geodeticSurfaceNormal(base, new Cesium.Cartesian3());
  const eye = Cesium.Cartesian3.add(base, Cesium.Cartesian3.multiplyByScalar(up2, EYE, new Cesium.Cartesian3()), new Cesium.Cartesian3());
  cam.setView({ destination: eye, orientation: { direction: cam.directionWC, up: up2 } });
}
function setGround(on){
  groundMode = on;
  document.getElementById("pegman").style.opacity = on ? 0.4 : 1;
  if (on){
    cc.rotateEventTypes = []; cc.tiltEventTypes = []; cc.translateEventTypes = [];
    cc.lookEventTypes = [Cesium.CameraEventType.LEFT_DRAG];
    cc.zoomEventTypes = [Cesium.CameraEventType.WHEEL, Cesium.CameraEventType.PINCH];
    cc.enableCollisionDetection = false;
    tipEl.textContent = "Gateplan · WASD = gå (Shift = løp) · dra = se deg rundt · dobbeltklikk = steg framover · ⌂ Oversikt = avslutt";
  } else {
    cc.rotateEventTypes = DEF.rot; cc.tiltEventTypes = DEF.tilt; cc.translateEventTypes = DEF.tr;
    cc.lookEventTypes = DEF.look; cc.zoomEventTypes = DEF.zoom; cc.enableCollisionDetection = true;
    keys.clear();
    tipEl.textContent = "";
  }
}
// double-click (while standing) = step forward in the facing direction
new Cesium.ScreenSpaceEventHandler(viewer.canvas).setInputAction(()=>{
  if (groundMode) moveForward(16);
}, Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK);

// pegman drag-and-drop
const peg = document.getElementById("pegman");
let ghost = null;
function moveGhost(x,y){ if(ghost){ ghost.style.left=x+"px"; ghost.style.top=y+"px"; } }
peg.addEventListener("pointerdown",(e)=>{
  e.preventDefault(); peg.setPointerCapture(e.pointerId);
  ghost = document.createElement("div"); ghost.textContent = "🧍";
  ghost.style.cssText = "position:fixed;font-size:38px;pointer-events:none;z-index:50;transform:translate(-50%,-92%);filter:drop-shadow(0 2px 3px #000a)";
  document.body.appendChild(ghost); moveGhost(e.clientX, e.clientY);
  viewer.canvas.style.cursor = "crosshair";
});
peg.addEventListener("pointermove",(e)=>{ if(ghost) moveGhost(e.clientX, e.clientY); });
peg.addEventListener("pointerup",(e)=>{
  if(!ghost) return;
  ghost.remove(); ghost = null; viewer.canvas.style.cursor = "";
  const r = viewer.canvas.getBoundingClientRect();
  if (e.clientX>=r.left && e.clientX<=r.right && e.clientY>=r.top && e.clientY<=r.bottom){
    const p = scene.pickPosition(new Cesium.Cartesian2(e.clientX-r.left, e.clientY-r.top));
    if (Cesium.defined(p)){ setGround(true); standAt(p); }
  }
});

document.getElementById("bHome").onclick=()=>{ if(groundMode) setGround(false); homeView(); };

let playing=false, last=0;
// WASD / arrow-key walking while at ground level
const keys=new Set();
const WALK_CODES=["KeyW","KeyA","KeyS","KeyD","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","ShiftLeft","ShiftRight"];
addEventListener("keydown",(e)=>{ if(groundMode && WALK_CODES.includes(e.code)){ keys.add(e.code); e.preventDefault(); } });
addEventListener("keyup",(e)=>{ keys.delete(e.code); });
function flatten(v, up){ const o=Cesium.Cartesian3.clone(v,new Cesium.Cartesian3());
  const d=Cesium.Cartesian3.dot(o,up); Cesium.Cartesian3.subtract(o,Cesium.Cartesian3.multiplyByScalar(up,d,new Cesium.Cartesian3()),o);
  return Cesium.Cartesian3.normalize(o,o); }
function groundStep(dt){
  const fI=(keys.has("KeyW")||keys.has("ArrowUp")?1:0)-(keys.has("KeyS")||keys.has("ArrowDown")?1:0);
  const rI=(keys.has("KeyD")||keys.has("ArrowRight")?1:0)-(keys.has("KeyA")||keys.has("ArrowLeft")?1:0);
  if(!fI && !rI) return;
  const cam=viewer.camera;
  const up=Cesium.Ellipsoid.WGS84.geodeticSurfaceNormal(cam.positionWC,new Cesium.Cartesian3());
  const move=new Cesium.Cartesian3();
  Cesium.Cartesian3.add(Cesium.Cartesian3.multiplyByScalar(flatten(cam.directionWC,up),fI,new Cesium.Cartesian3()),
                        Cesium.Cartesian3.multiplyByScalar(flatten(cam.rightWC,up),rI,new Cesium.Cartesian3()), move);
  Cesium.Cartesian3.normalize(move,move);
  const speed=(keys.has("ShiftLeft")||keys.has("ShiftRight")?28:11)*dt;
  const ahead=Cesium.Cartesian3.add(cam.positionWC, Cesium.Cartesian3.multiplyByScalar(move,speed,new Cesium.Cartesian3()), new Cesium.Cartesian3());
  const ground=scene.clampToHeight(ahead, proposal?[proposal]:[]);
  const base=Cesium.defined(ground)?ground:ahead;
  const up2=Cesium.Ellipsoid.WGS84.geodeticSurfaceNormal(base,new Cesium.Cartesian3());
  const eye=Cesium.Cartesian3.add(base,Cesium.Cartesian3.multiplyByScalar(up2,EYE,new Cesium.Cartesian3()),new Cesium.Cartesian3());
  cam.setView({destination:eye, orientation:{direction:cam.directionWC, up:up2}});
}
document.getElementById("bPlay").onclick=(e)=>{ playing=!playing; e.target.classList.toggle("on",playing); e.target.textContent=playing?"❚❚ Dag":"▶ Dag"; };
viewer.clock.onTick.addEventListener(()=>{
  const now=performance.now(); if(!last) last=now; const dt=Math.min(0.1,(now-last)/1000); last=now;
  if(playing){ hourEl.value=(+hourEl.value + dt*90)%1440; updateSun(); }   // 90 sim-min per real sec
  if(groundMode) groundStep(dt);
});

init().catch(err=>{ document.getElementById("load").textContent="Feil: "+err.message; console.error(err); });
</script>
</body>
</html>
