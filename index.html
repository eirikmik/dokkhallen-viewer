<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dokkhallen Harstad — interaktiv solvisning</title>
<style>
  :root { --bg:#0e1116; --panel:#171c24; --line:#2a323d; --txt:#e7ecf2; --mut:#8b97a6; --acc:#4ea3ff; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; }
  #c { position:fixed; inset:0; display:block; }
  #ui { position:fixed; top:12px; left:12px; width:280px; background:var(--panel);
    border:1px solid var(--line); border-radius:10px; padding:14px; backdrop-filter:blur(6px); }
  #ui h1 { font-size:13px; margin:0 0 2px; letter-spacing:.02em; }
  #ui .sub { color:var(--mut); font-size:11px; margin-bottom:12px; }
  .row { margin:10px 0; }
  .row label { display:flex; justify-content:space-between; color:var(--mut);
    font-size:11px; margin-bottom:4px; }
  .row label b { color:var(--txt); font-weight:600; font-variant-numeric:tabular-nums; }
  input[type=range] { width:100%; accent-color:var(--acc); }
  .readout { display:flex; gap:8px; margin-top:6px; }
  .chip { flex:1; background:#0f141b; border:1px solid var(--line); border-radius:7px;
    padding:7px 8px; text-align:center; }
  .chip span { display:block; color:var(--mut); font-size:10px; }
  .chip b { font-size:15px; font-variant-numeric:tabular-nums; }
  .btns { display:flex; gap:6px; margin-top:12px; }
  button { flex:1; background:#222b36; color:var(--txt); border:1px solid var(--line);
    border-radius:7px; padding:8px; cursor:pointer; font-size:12px; }
  button:hover { border-color:var(--acc); }
  button.on { background:var(--acc); color:#03121f; border-color:var(--acc); font-weight:600; }
  #hint { position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
    background:rgba(13,17,23,.85); border:1px solid var(--line); border-radius:8px;
    padding:8px 14px; color:var(--mut); font-size:12px; }
  #hint b { color:var(--txt); }
  #load { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:var(--bg); color:var(--mut); font-size:14px; z-index:5; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="load">Laster modell…</div>
<div id="ui">
  <h1>Dokkhallen Harstad</h1>
  <div class="sub">68,797°N 16,543°E · sol og skygger i sanntid</div>
  <div class="row">
    <label>Dato <b id="dLbl">21. jun</b></label>
    <input id="day" type="range" min="0" max="364" value="171"/>
  </div>
  <div class="row">
    <label>Klokkeslett (<span id="tz">CET</span>) <b id="tLbl">13:00</b></label>
    <input id="hour" type="range" min="0" max="1439" value="780"/>
  </div>
  <div class="readout">
    <div class="chip"><span>SOLHØYDE</span><b id="elv">–</b></div>
    <div class="chip"><span>ASIMUT</span><b id="azm">–</b></div>
  </div>
  <label style="display:flex;align-items:center;gap:8px;margin:10px 0 2px;cursor:pointer;color:var(--txt);font-size:12px">
    <input id="toggle" type="checkbox" checked style="accent-color:var(--acc);width:15px;height:15px"/> Vis foreslått dokkhall</label>
  <label style="display:flex;align-items:center;gap:8px;margin:4px 0 2px;cursor:pointer;color:var(--txt);font-size:12px">
    <input id="hard" type="checkbox" style="accent-color:var(--acc);width:15px;height:15px"/> Harde skygger</label>
  <div class="btns">
    <button id="bOrbit" class="on">Oversikt</button>
    <button id="bWalk">Gå (1,5 m)</button>
    <button id="bPlay">▶ Dag</button>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
    <div id="pegman" title="Dra ut på kartet for å stå der (1,5 m)" style="font-size:26px;cursor:grab;user-select:none;touch-action:none">🧍</div>
    <span style="color:var(--mut);font-size:11px">Dra figuren ut på kartet for gateplan</span>
  </div>
</div>
<div id="hint">Dra for å se · rull for zoom · dra <b>🧍</b> for å stå · Gå: <b>WASD</b> · <b>Esc</b> for panel, klikk i visningen for å fortsette</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const LAT = 68.7970, LON = 16.5427;
// Norway timezone incl. EU DST: CET (+1) standard, CEST (+2) last Sun Mar .. last Sun Oct
function euOffset(y, mo, da){
  const lastSun = (m)=>{ const d=new Date(Date.UTC(y, m+1, 0)); return d.getUTCDate()-d.getUTCDay(); };
  let dst;
  if (mo<3 || mo>10) dst=false;
  else if (mo>3 && mo<10) dst=true;
  else if (mo===3) dst = da>=lastSun(2);
  else dst = da<lastSun(9);   // October
  return dst ? 2 : 1;
}

// ---- solar position (NOAA), returns {az: deg from N CW, el: deg} ----
function sunAzEl(year, month, day, hourLocal) {
  const rad = Math.PI/180, deg = 180/Math.PI;
  const hUTC = hourLocal - euOffset(year, month, day);
  const a = Math.floor((14-month)/12), y = year+4800-a, m = month+12*a-3;
  const jdn = day + Math.floor((153*m+2)/5) + 365*y + Math.floor(y/4) - Math.floor(y/100) + Math.floor(y/400) - 32045;
  const jd = jdn + (hUTC-12)/24, n = jd - 2451545.0;
  const g = ((357.529+0.98560028*n)%360)*rad, L = ((280.459+0.98564736*n)%360)*rad;
  const lam = L + (1.915*Math.sin(g)+0.020*Math.sin(2*g))*rad;
  const eps = (23.439-0.00000036*n)*rad;
  const decl = Math.asin(Math.sin(eps)*Math.sin(lam));
  const yy = Math.tan(eps/2)**2;
  const eot = 4*deg*(yy*Math.sin(2*L) - 2*0.0167*Math.sin(g) + 4*0.0167*yy*Math.sin(g)*Math.cos(2*L)
              - 0.5*yy*yy*Math.sin(4*L) - 1.25*0.0167*0.0167*Math.sin(2*g));
  const tst = ((hUTC*60 + eot + 4*LON)%1440 + 1440)%1440;
  const ha = (tst/4 - 180)*rad, latr = LAT*rad;
  const el = 90 - Math.acos(Math.sin(latr)*Math.sin(decl)+Math.cos(latr)*Math.cos(decl)*Math.cos(ha))*deg;
  let az = Math.atan2(Math.sin(ha), Math.cos(ha)*Math.sin(latr)-Math.tan(decl)*Math.cos(latr))*deg + 180;
  az = (az%360+360)%360;
  return { az, el };
}
const MON = ["jan","feb","mar","apr","mai","jun","jul","aug","sep","okt","nov","des"];
const MDAYS = [31,28,31,30,31,30,31,31,30,31,30,31];
function doyToMD(doy){ let m=0,d=doy; while(d>=MDAYS[m]){d-=MDAYS[m];m++;} return [m+1,d+1]; }

// ---- scene ----
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.AgXToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 20000);
camera.position.set(280, 260, 360);

const sky = new THREE.Color();
scene.background = sky;

const hemi = new THREE.HemisphereLight(0x9bb4d6, 0x40434a, 0.6);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 3.0);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
const S = 750;
Object.assign(sun.shadow.camera, { left:-S, right:S, top:S, bottom:-S, near:1, far:4000 });
sun.shadow.bias = -0.0004;
sun.shadow.radius = 3;     // default soft; tightened when 'Harde skygger' is on
scene.add(sun); scene.add(sun.target);

// visible sun disc (glow sprite) placed in the real sun direction
function sunTex(){
  const c=document.createElement('canvas'); c.width=c.height=128; const g=c.getContext('2d');
  const grd=g.createRadialGradient(64,64,0,64,64,64);
  grd.addColorStop(0,'rgba(255,252,235,1)'); grd.addColorStop(0.18,'rgba(255,240,150,1)');
  grd.addColorStop(0.45,'rgba(255,205,80,0.45)'); grd.addColorStop(1,'rgba(255,195,70,0)');
  g.fillStyle=grd; g.fillRect(0,0,128,128); return new THREE.CanvasTexture(c);
}
const sunDisc = new THREE.Sprite(new THREE.SpriteMaterial({ map:sunTex(), transparent:true,
  blending:THREE.AdditiveBlending, depthWrite:false }));
sunDisc.scale.set(520,520,1);
scene.add(sunDisc);

// orbit
const orbit = new OrbitControls(camera, renderer.domElement);
orbit.target.set(0, 10, 0); orbit.maxPolarAngle = Math.PI*0.499; orbit.update();
// walk
const walk = new PointerLockControls(camera, renderer.domElement);
let mode = 'orbit';
const keys = {};
addEventListener('keydown', e=>keys[e.code]=true);
addEventListener('keyup',   e=>keys[e.code]=false);

const terrains = [];
let proposal = null;
const ray = new THREE.Raycaster();
function groundY(x, z){
  ray.set(new THREE.Vector3(x, 2000, z), new THREE.Vector3(0,-1,0));
  const hit = ray.intersectObjects(terrains, true);
  return hit.length ? hit[0].point.y : 0;
}

// procedural facade on the clean massing: framed windows, reflective glass (catches
// the sun), taller ground floor, per-window variation, lit windows at night.
// live-tunable:  tuneWindows({glass:0.85, tint:0.25, spandrel:0.96, win:1, floor:3.3, winW:2.6, frame:0.55})
const FACADE_U = {
  uGlass:{value:0.85}, uTint:{value:0.26}, uSpandrel:{value:0.96}, uWin:{value:1.0},
  uFloor:{value:3.3}, uWinW:{value:2.6}, uFrame:{value:0.5}, uLitFrac:{value:0.0}, uFacade:{value:1.0}
};
// master on/off for the whole window effect:  windows(false) / windows(true)
window.windows = (on=true)=>{ FACADE_U.uFacade.value = on?1:0; console.log('windows', on?'ON':'OFF'); };
function makeFacade(){
  const m = new THREE.MeshStandardMaterial({ vertexColors:true, color:0xffffff, roughness:0.9, metalness:0.0 });
  m.onBeforeCompile = (sh)=>{
    Object.assign(sh.uniforms, FACADE_U);
    sh.vertexShader = sh.vertexShader
      .replace('#include <common>', '#include <common>\nvarying vec3 vWPos; varying vec3 vWNrm;')
      .replace('#include <worldpos_vertex>', '#include <worldpos_vertex>\n vWPos=(modelMatrix*vec4(transformed,1.0)).xyz; vWNrm=mat3(modelMatrix)*objectNormal;');
    sh.fragmentShader = sh.fragmentShader
      .replace('#include <common>', '#include <common>\nvarying vec3 vWPos; varying vec3 vWNrm;\nuniform float uGlass,uTint,uSpandrel,uWin,uFloor,uWinW,uFrame,uLitFrac,uFacade;')
      .replace('#include <color_fragment>', `#include <color_fragment>
      float gGlass=0.0, gLit=0.0; vec3 gLitCol=vec3(0.0);
      { vec3 n=normalize(vWNrm);
        float vert=1.0-smoothstep(0.25,0.45,abs(n.y));   // 1 on walls, 0 on roofs
        if(vert>0.01){
          float hc = abs(n.x)>abs(n.z) ? vWPos.z : vWPos.x;
          float h = vWPos.y;
          float gTop = uFloor*1.5;                       // taller ground floor
          bool grd = h < gTop;
          float fh = grd ? gTop : uFloor;
          float fy = grd ? (h/gTop) : fract((h-gTop)/uFloor);
          float fx = fract(hc/uWinW);
          float pane  = step(0.17,fy)*step(fy,0.86)*step(0.20,fx)*step(fx,0.80);
          float frame = step(0.10,fy)*step(fy,0.93)*step(0.13,fx)*step(fx,0.87) - pane;
          vec2 cell = vec2(floor(hc/uWinW), floor((h-gTop)/uFloor));
          float r = fract(sin(dot(cell, vec2(12.99,78.23)))*43758.55);  // per-window rng
          float win = pane*uWin;
          vec3 sky = vec3(0.45,0.58,0.80);
          vec3 glass = mix(diffuseColor.rgb*uGlass, sky, uTint) * (0.85+0.3*r);
          vec3 wall  = diffuseColor.rgb*uSpandrel;
          vec3 frmC  = diffuseColor.rgb*uFrame;
          vec3 facade = mix(mix(wall, frmC, frame), glass, win);
          float fac = vert*uFacade;                       // master window on/off
          diffuseColor.rgb = mix(diffuseColor.rgb, facade, fac);
          gGlass = win*fac;
          float r2 = fract(sin(dot(cell, vec2(39.34,11.13)))*24634.6);   // 2nd rng
          float inten = 0.45 + 1.1*r2;                                   // per-window brightness
          vec3 lcol = mix(vec3(1.0,0.74,0.42), vec3(1.0,0.92,0.78), r2); // warm .. warm-white
          gLit = win*fac*step(r, uLitFrac);                            // lit if window rng < lit fraction
          gLitCol = lcol*inten;
          diffuseColor.rgb = mix(diffuseColor.rgb, lcol, gLit*0.5*inten);
        } }`)
      .replace('#include <roughnessmap_fragment>', '#include <roughnessmap_fragment>\n roughnessFactor = mix(roughnessFactor, 0.08, gGlass);')
      .replace('#include <metalnessmap_fragment>', '#include <metalnessmap_fragment>\n metalnessFactor = mix(metalnessFactor, 0.45, gGlass);')
      .replace('#include <emissivemap_fragment>', '#include <emissivemap_fragment>\n totalEmissiveRadiance += gLitCol*gLit*1.6;');
  };
  return m;
}
window.tuneWindows = (o={})=>{
  const map={glass:'uGlass',tint:'uTint',spandrel:'uSpandrel',win:'uWin',floor:'uFloor',winW:'uWinW',frame:'uFrame'};
  for(const k in o){ if(map[k]) FACADE_U[map[k]].value=o[k]; }
  if(o.lit!=null){ window._litScale=o.lit; updateSun(); }   // overall lit-window density
  console.log('windows', Object.fromEntries(Object.entries(FACADE_U).map(([k,v])=>[k,v.value])), 'litScale', window._litScale ?? 1);
};

const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(draco);
gltfLoader.load('scene.glb', (g)=>{
  g.scene.traverse(o=>{
    if (o.isMesh){
      o.castShadow = true; o.receiveShadow = true;
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      if (mats.some(m=>m && m.map)) {          // terrain (multi-material ortho)
        terrains.push(o); mats.forEach(m=>{ if(m) m.roughness = 0.95; });
      } else {                                  // the non-terrain mesh = the hall
        proposal = o; if(o.material) o.material.roughness = 0.92;
      }
    }
  });
  scene.add(g.scene);
  document.getElementById('load').remove();
  updateSun();
}, undefined, (e)=>{ document.getElementById('load').textContent = 'Kunne ikke laste scene.glb — kjør en lokal server (se README).'; });
// colored city buildings (Google-sampled) with procedural windows
gltfLoader.load('city_colored.glb', (g)=>{
  const fm = makeFacade();
  g.scene.traverse(o=>{ if(o.isMesh){ o.material = fm; o.castShadow = true; o.receiveShadow = true; } });
  scene.add(g.scene);
}, undefined, ()=>{});

// ---- sun update from UI ----
const dayEl=document.getElementById('day'), hourEl=document.getElementById('hour');
function updateSun(){
  const [mo,da] = doyToMD(+dayEl.value);
  const hod = (+hourEl.value)/60;
  document.getElementById('dLbl').textContent = da+'. '+MON[mo-1];
  document.getElementById('tLbl').textContent = String(Math.floor(hod)).padStart(2,'0')+':'+String(Math.round((hod%1)*60)).padStart(2,'0');
  document.getElementById('tz').textContent = euOffset(2025,mo,da)===2 ? 'CEST' : 'CET';
  const {az,el} = sunAzEl(2025, mo, da, hod);
  document.getElementById('elv').textContent = el.toFixed(0)+'°';
  document.getElementById('azm').textContent = az.toFixed(0)+'°';
  // direction toward sun in three (E=+x, up=+y, north=-z)
  const e=el*Math.PI/180, a=az*Math.PI/180;
  const dir = new THREE.Vector3(Math.cos(e)*Math.sin(a), Math.sin(e), -Math.cos(e)*Math.cos(a));
  sun.position.copy(dir.clone().multiplyScalar(1500));
  sun.target.position.set(0,0,0);
  sunDisc.position.copy(dir.clone().multiplyScalar(8000));   // visible sun in the sky
  sunDisc.visible = el > -2;
  const night = THREE.MathUtils.clamp((4-el)/12, 0, 1);            // 0 day .. 1 dark
  const occ = (hod>=17 && hod<22) ? 0.26 : ((hod>=22 || hod<7) ? 0.07 : 0.03); // evening many, 22–07 few
  FACADE_U.uLitFrac.value = occ * night * (window._litScale ?? 1);
  const warmS = THREE.MathUtils.clamp(1-(el/15), 0, 1);      // orange near horizon
  sunDisc.material.color.setRGB(1, 1-0.42*warmS, 1-0.72*warmS);
  const up = Math.max(0, Math.sin(e));
  // brightness tracks whether the sun is UP (full daylight even at low midnight-sun
  // angles), only dimming through twilight as it drops below the horizon.
  const day = THREE.MathUtils.clamp((el+6)/8, 0, 1);   // 0 at el<=-6, 1 at el>=2
  sun.intensity = (el>0 ? (1.7 + 1.5*up) : 0.0) * (window._hardShadows ? 1.25 : 1.0);  // strong when sun up
  hemi.intensity = (0.12 + 1.05*day) * (window._hardShadows ? 0.16 : 1.0);   // cut ambient -> darker shadows
  sky.setRGB(0.05+0.45*day, 0.08+0.55*day, 0.13+0.66*day).convertSRGBToLinear();
  const warm = THREE.MathUtils.clamp(1-(el/10), 0, 1);  // redden near horizon
  sun.color.setRGB(1, 1-0.32*warm, 1-0.6*warm);
}
dayEl.oninput = updateSun; hourEl.oninput = updateSun;

// stand point is set only by dropping the Pegman (click-to-walk disabled)
let pendingStand = null;

// ---- mode switching ----
const bOrbit=document.getElementById('bOrbit'), bWalk=document.getElementById('bWalk');
function setMode(m){
  mode=m;
  bOrbit.classList.toggle('on', m==='orbit'); bWalk.classList.toggle('on', m==='walk');
  if (m==='walk'){
    orbit.enabled=false;
    camera.up.set(0,1,0);
    const p = pendingStand || new THREE.Vector3(120,0,-150);
    camera.position.set(p.x, groundY(p.x,p.z)+1.5, p.z);
    // start looking level: keep current heading, zero the pitch
    const fwd = new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.y = 0;
    if (fwd.lengthSq() < 1e-4) fwd.set(0,0,-1);
    fwd.normalize();
    camera.lookAt(camera.position.clone().add(fwd));
    walk.lock();
  } else {                                  // orbit: fully reset to the overview
    if(walk.isLocked) walk.unlock();
    camera.up.set(0,1,0);
    camera.position.set(280, 260, 360);
    orbit.target.set(0, 10, 0);
    orbit.enabled=true; orbit.update();
  }
}
bOrbit.onclick=()=>setMode('orbit');
bWalk.onclick=()=>setMode('walk');
walk.addEventListener('unlock', ()=>{ if(mode==='walk'){ /* stay in walk; click viewport to re-lock */ } });
// Esc unlocks the pointer (to use the panel); clicking back on the viewport re-locks walk
renderer.domElement.addEventListener('click', ()=>{ if(mode==='walk' && !walk.isLocked) walk.lock(); });

// ---- proposed Dokkhallen on/off ----
document.getElementById('toggle').onchange = (e)=>{ if(proposal) proposal.visible = e.target.checked; };
document.getElementById('hard').onchange = (e)=>{
  window._hardShadows = e.target.checked;
  const S = window._hardShadows ? 450 : 750;     // tighter frustum = sharper shadows
  Object.assign(sun.shadow.camera, {left:-S, right:S, top:S, bottom:-S});
  sun.shadow.camera.updateProjectionMatrix();
  sun.shadow.radius = window._hardShadows ? 1 : 3;
  updateSun();
};

// ---- Pegman: drag the figure onto the map to stand at 1.5 m ----
const peg = document.getElementById('pegman');
let pghost = null;
peg.addEventListener('pointerdown',(e)=>{
  e.preventDefault(); peg.setPointerCapture(e.pointerId);
  pghost = document.createElement('div'); pghost.textContent='🧍';
  pghost.style.cssText='position:fixed;font-size:36px;pointer-events:none;z-index:50;transform:translate(-50%,-92%);filter:drop-shadow(0 2px 3px #000a)';
  document.body.appendChild(pghost); pghost.style.left=e.clientX+'px'; pghost.style.top=e.clientY+'px';
});
peg.addEventListener('pointermove',(e)=>{ if(pghost){ pghost.style.left=e.clientX+'px'; pghost.style.top=e.clientY+'px'; }});
peg.addEventListener('pointerup',(e)=>{
  if(!pghost) return; pghost.remove(); pghost=null;
  const r = renderer.domElement.getBoundingClientRect();
  if(e.clientX<r.left||e.clientX>r.right||e.clientY<r.top||e.clientY>r.bottom) return;
  const m = new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1, -((e.clientY-r.top)/r.height)*2+1);
  ray.setFromCamera(m, camera);
  const hit = ray.intersectObjects(terrains, true);
  if(hit.length){ pendingStand = hit[0].point.clone(); setMode('walk'); }
});

// ---- play day ----
let playing=false;
document.getElementById('bPlay').onclick=(e)=>{ playing=!playing; e.target.classList.toggle('on',playing); e.target.textContent = playing?'❚❚ Dag':'▶ Dag'; };

// ---- loop ----
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (playing){ hourEl.value = (+hourEl.value + dt*90)%1440; updateSun(); }
  if (mode==='walk' && walk.isLocked){
    const sp = (keys['ShiftLeft']?34:14)*dt;
    if(keys['KeyW']) walk.moveForward(sp);
    if(keys['KeyS']) walk.moveForward(-sp);
    if(keys['KeyA']) walk.moveRight(-sp);
    if(keys['KeyD']) walk.moveRight(sp);
    camera.position.y = groundY(camera.position.x, camera.position.z)+1.5;
  } else if (mode==='orbit'){ orbit.update(); }
  renderer.render(scene, camera);
}
